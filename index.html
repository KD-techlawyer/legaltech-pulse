// ── RENDER ──
function renderCard(a) {
  return `
    <div class="article">
      <div class="article-header">
        <h2><a href="${a.url || '#'}" target="_blank" rel="noopener">${a.title}</a></h2>
        <div class="meta">${a.source || ''}<br><span class="pub-date">${a.published || ''}</span></div>
      </div>
      <div class="summary">${a.summary}</div>
      <div class="tags">
        ${(a.tags || []).map(t => `<span class="tag tag-${tagClass(t)}">${t}</span>`).join('')}
      </div>
    </div>`;
}

function render(data) {
  document.getElementById('briefing-date').textContent = data.date || new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Stats across all articles
  const all = [...(data.articles || []), ...(data.archive || [])];
  const statsEl = document.getElementById('stats');
  const counts = {};
  all.forEach(a => (a.tags || []).forEach(t => counts[t] = (counts[t]||0)+1));
  statsEl.innerHTML = `<div class="stat"><strong>${all.length}</strong> stories</div>` +
    Object.entries(counts).map(([k,v]) => `<div class="stat"><strong>${v}</strong> ${k}</div>`).join('');

  // Today's stories (last 48h)
  const todayEl = document.getElementById('today-section');
  const fresh = data.articles || [];
  if (fresh.length > 0) {
    todayEl.innerHTML =
      `<div class="section-header"><h3>Fresh <span class="count">(last 48h · ${fresh.length} stories)</span></h3><div class="line"></div></div>` +
      fresh.map(renderCard).join('');
  } else {
    todayEl.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No new stories in the last 48 hours. Check back tomorrow.</p></div>';
  }

  // Archive
  const archiveEl = document.getElementById('archive-section');
  const older = data.archive || [];
  if (older.length > 0) {
    archiveEl.innerHTML =
      `<div class="archive-section"><div class="section-header"><h3>Earlier <span class="count">(${older.length} stories)</span></h3><div class="line"></div></div>` +
      older.map(renderCard).join('') + '</div>';
  }
}

function tagClass(tag) {
  const t = tag.toLowerCase();
  if (t.includes('india')) return 'india';
  if (t.includes('global')) return 'global';
  if (t.includes('ai') || t.includes('tool')) return 'ai';
  if (t.includes('firm')) return 'firm';
  return 'trend';
}

render(BRIEFING_DATA);
